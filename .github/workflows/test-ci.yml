name: CI Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:

  environment-healthcheck:
    name: Environment Healthcheck
    runs-on: ubuntu-latest
    steps:

      - name: Run Healthcheck
        run: |
          echo "Checking environment..."
          echo "ERROR: Database connection failed" > healthcheck.log
          echo "ERROR: Redis not reachable" >> healthcheck.log
          exit 1        # <-- forces failure

      - name: Upload Healthcheck Log
        if: always()   # upload even if step above fails
        uses: actions/upload-artifact@v4
        with:
          name: healthcheck-logs
          path: healthcheck.log

  functionality-test:
    name: Functionality Test
    runs-on: ubuntu-latest
    steps:

      - name: Run Tests
        run: |
          echo "Running functionality tests..."
          echo "FAIL: test_login - AssertionError" > functionality.log
          echo "FAIL: test_checkout - TimeoutError" >> functionality.log
          exit 1        # <-- forces failure

      - name: Upload Functionality Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: functionality-test-logs
          path: functionality.log
